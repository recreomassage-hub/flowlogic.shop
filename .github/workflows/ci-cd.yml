# CI/CD Pipeline для Flow Logic
# Использует GitHub Personal Access Token для работы агентов

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Полная история для агентов
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Updated from '20' (Node.js 20.x deprecated in Lambda 2026-04-30)
          # Не используем cache, так как package-lock.json в поддиректориях
      
      - name: Check project structure
        run: |
          echo "📁 Project structure:"
          ls -la src/ 2>/dev/null || echo "⚠️  src/ directory not found"
          echo ""
          echo "Backend:"
          ls -la src/backend/ 2>/dev/null | head -5 || echo "⚠️  src/backend/ not found"
          echo ""
          echo "Frontend:"
          ls -la src/frontend/ 2>/dev/null | head -5 || echo "⚠️  src/frontend/ not found"
      
      - name: Install dependencies (Backend)
        run: |
          if [ -f "src/backend/package.json" ]; then
            echo "📦 Installing backend dependencies..."
            cd src/backend
            if [ -f "package-lock.json" ]; then
              npm ci || {
                echo "⚠️  npm ci failed, trying npm install..."
                npm install
              }
            else
              echo "⚠️  package-lock.json not found, using npm install"
              npm install
            fi
            echo "✅ Backend dependencies installed"
          else
            echo "⚠️  Backend package.json not found, skipping..."
          fi
      
      - name: Install dependencies (Frontend)
        run: |
          if [ -f "src/frontend/package.json" ]; then
            echo "📦 Installing frontend dependencies..."
            cd src/frontend
            if [ -f "package-lock.json" ]; then
              npm ci || {
                echo "⚠️  npm ci failed, trying npm install..."
                npm install
              }
            else
              echo "⚠️  package-lock.json not found, using npm install"
              npm install
            fi
            echo "✅ Frontend dependencies installed"
          else
            echo "⚠️  Frontend package.json not found, skipping..."
          fi
      
      - name: Build Backend
        run: |
          if [ -f "src/backend/package.json" ] && [ -f "src/backend/tsconfig.json" ]; then
            echo "📦 Building backend..."
            echo "📁 Current directory: $(pwd)"
            echo "📁 Checking config files:"
            ls -la src/backend/config/*.ts || echo "⚠️  Config files not found"
            cd src/backend
            echo "📁 In backend directory: $(pwd)"
            echo "📁 Config files here:"
            ls -la config/*.ts || echo "⚠️  Config files not found in backend/"
            npm run build || {
              echo "❌ Backend build failed"
              exit 1
            }
            echo "✅ Backend build successful"
          else
            echo "⚠️  Backend not found or not configured, skipping build..."
          fi
      
      - name: Build Frontend
        run: |
          if [ -f "src/frontend/package.json" ]; then
            echo "📦 Building frontend..."
            cd src/frontend
            npm run build || {
              echo "❌ Frontend build failed"
              exit 1
            }
            echo "✅ Frontend build successful"
          else
            echo "⚠️  Frontend not found or not configured, skipping build..."
          fi
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.flowlogic.shop' }}
      
      - name: Run tests
        if: hashFiles('src/backend/package.json') != ''
        run: |
          cd src/backend
          npm test -- --coverage || true
        continue-on-error: true

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Deploy Backend (Serverless)
        run: |
          if [ -d "infra/serverless" ]; then
            cd infra/serverless
            echo "📦 Installing Serverless Framework..."
            npm install -g serverless@latest
            echo "📦 Installing dependencies..."
            npm install
            echo "🚀 Deploying to staging..."
            serverless deploy --stage staging
          else
            echo "⚠️  infra/serverless directory not found, skipping deployment"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Deploy Frontend (Vercel)
        run: |
          cd src/frontend
          npm install -g vercel
          vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-production:
    name: Deploy to Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    # Если используется OIDC, нужны permissions для получения токена
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Check AWS credentials configuration
        id: check-aws-creds
        run: |
          echo "🔍 Checking AWS credentials configuration..."
          
          # Проверка ARN
          AWS_ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          if [ -n "$AWS_ROLE_ARN" ]; then
            echo "✅ AWS_ROLE_ARN found"
            echo "ARN format check:"
            if [[ "$AWS_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/[a-zA-Z0-9+=,.@_-]+$ ]]; then
              echo "✅ ARN format is valid"
              echo "ARN: $AWS_ROLE_ARN"
              echo "USE_OIDC=true" >> $GITHUB_OUTPUT
            else
              echo "❌ ARN format is INVALID!"
              echo "Expected format: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME"
              echo "Current value: $AWS_ROLE_ARN"
              echo ""
              echo "⚠️  Will skip OIDC and use Access Keys instead"
              echo "USE_OIDC=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️  AWS_ROLE_ARN not found, will use Access Keys"
            echo "USE_OIDC=false" >> $GITHUB_OUTPUT
          fi
          
          # Проверка Access Keys (для production используем _PROD суффикс)
          AWS_ACCESS_KEY_ID_VAL="${{ secrets.AWS_ACCESS_KEY_ID_PROD }}"
          AWS_SECRET_ACCESS_KEY_VAL="${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}"
          
          # Fallback на общие имена (для обратной совместимости)
          if [ -z "$AWS_ACCESS_KEY_ID_VAL" ]; then
            AWS_ACCESS_KEY_ID_VAL="${{ secrets.AWS_ACCESS_KEY_ID }}"
          fi
          if [ -z "$AWS_SECRET_ACCESS_KEY_VAL" ]; then
            AWS_SECRET_ACCESS_KEY_VAL="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
          fi
          
          if [ -n "$AWS_ACCESS_KEY_ID_VAL" ] && [ -n "$AWS_SECRET_ACCESS_KEY_VAL" ]; then
            echo "✅ AWS Access Keys found (using AWS_ACCESS_KEY_ID_PROD or AWS_ACCESS_KEY_ID)"
            echo "HAS_ACCESS_KEYS=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  AWS Access Keys not found"
            echo "   Проверьте наличие AWS_ACCESS_KEY_ID_PROD или AWS_ACCESS_KEY_ID"
            echo "   Проверьте наличие AWS_SECRET_ACCESS_KEY_PROD или AWS_SECRET_ACCESS_KEY"
            echo "HAS_ACCESS_KEYS=false" >> $GITHUB_OUTPUT
          fi
          
          # Финальная проверка (используем переменные вместо outputs для проверки в том же шаге)
          USE_OIDC_VAL="false"
          HAS_ACCESS_KEYS_VAL="false"
          
          if [ -n "$AWS_ROLE_ARN" ] && [[ "$AWS_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/[a-zA-Z0-9+=,.@_-]+$ ]]; then
            USE_OIDC_VAL="true"
          fi
          
          # Используем те же переменные, что и выше
          if [ -n "$AWS_ACCESS_KEY_ID_VAL" ] && [ -n "$AWS_SECRET_ACCESS_KEY_VAL" ]; then
            HAS_ACCESS_KEYS_VAL="true"
          fi
          
          if [ "$USE_OIDC_VAL" != "true" ] && [ "$HAS_ACCESS_KEYS_VAL" != "true" ]; then
            echo "❌ ERROR: Neither valid AWS_ROLE_ARN nor AWS Access Keys are configured!"
            echo ""
            echo "Please configure one of the following:"
            echo "1. AWS_ROLE_ARN (for OIDC) - format: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME"
            echo "   Current value appears to be empty or invalid"
            echo "2. AWS_ACCESS_KEY_ID_PROD + AWS_SECRET_ACCESS_KEY_PROD (for Access Keys - RECOMMENDED)"
            echo "   OR AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY (fallback)"
            echo ""
            echo "See: docs/deployment/aws_oidc_setup.md or docs/deployment/aws_credentials_setup.md"
            echo ""
            echo "📋 Проверка секретов:"
            echo "   https://github.com/recreomassage-hub/flowlogic.shop/settings/secrets/actions"
            exit 1
          fi
          
          echo ""
          echo "📊 Configuration summary:"
          echo "   USE_OIDC: $USE_OIDC_VAL"
          echo "   HAS_ACCESS_KEYS: $HAS_ACCESS_KEYS_VAL"
      
      - name: Configure AWS credentials (OIDC)
        if: steps.check-aws-creds.outputs.USE_OIDC == 'true'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
        continue-on-error: true
        id: aws-config-oidc
      
      - name: Configure AWS credentials (Access Keys)
        if: steps.check-aws-creds.outputs.USE_OIDC != 'true' && steps.check-aws-creds.outputs.HAS_ACCESS_KEYS == 'true'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD != '' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD != '' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
        id: aws-config-keys
      
      - name: Verify AWS credentials
        run: |
          echo "🔍 Verifying AWS credentials..."
          if [ "${{ steps.aws-config-oidc.outcome }}" == "success" ] || [ "${{ steps.aws-config-keys.outcome }}" == "success" ]; then
            aws sts get-caller-identity || {
              echo ""
              echo "❌ Failed to authenticate with AWS!"
              exit 1
            }
            echo "✅ AWS authentication successful"
            aws sts get-caller-identity
          else
            echo ""
            echo "❌ Failed to configure AWS credentials!"
            echo ""
            if [ "${{ steps.check-aws-creds.outputs.USE_OIDC }}" == "true" ]; then
              echo "🔍 OIDC Configuration Issue:"
              echo "   ARN: ${{ secrets.AWS_ROLE_ARN }}"
              echo ""
              echo "📋 ПРОВЕРЬТЕ:"
              echo "   1. ARN формат правильный: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME"
              echo "   2. Роль существует в AWS"
              echo "   3. OIDC Provider создан"
              echo "   4. Trust Policy настроен для OIDC"
              echo ""
              echo "💡 РЕШЕНИЕ: Используйте Access Keys"
              echo "   1. Добавьте AWS_ACCESS_KEY_ID и AWS_SECRET_ACCESS_KEY"
              echo "   2. Удалите или оставьте пустым AWS_ROLE_ARN"
              echo ""
              echo "📚 Troubleshooting: docs/deployment/troubleshooting/aws_credentials.md"
            else
              echo "🔍 Access Keys Configuration Issue:"
              echo ""
              echo "📋 ПРОВЕРЬТЕ:"
              echo "   1. AWS_ACCESS_KEY_ID_PROD добавлен в GitHub Secrets (или AWS_ACCESS_KEY_ID)"
              echo "   2. AWS_SECRET_ACCESS_KEY_PROD добавлен в GitHub Secrets (или AWS_SECRET_ACCESS_KEY)"
              echo "   3. Access Keys активны в AWS"
              echo ""
              echo "📚 Инструкция: docs/deployment/aws_credentials_setup.md"
            fi
            echo ""
            echo "🔗 Настройка Secrets:"
            echo "   https://github.com/recreomassage-hub/flowlogic.shop/settings/secrets/actions"
            echo ""
            exit 1
          fi
      
      - name: Deploy Backend (Serverless)
        run: |
          if [ -d "infra/serverless" ]; then
            cd infra/serverless
            echo "📦 Installing Serverless Framework..."
            npm install -g serverless@latest || {
              echo "⚠️  Failed to install serverless globally, trying local install..."
              npm install serverless --save-dev
            }
            echo "📦 Installing dependencies..."
            npm install
            echo "📁 Current directory: $(pwd)"
            echo "📁 Checking serverless.yml..."
            if [ -f "serverless.yml" ]; then
              echo "✅ serverless.yml found"
            else
              echo "❌ serverless.yml not found!"
              exit 1
            fi
            echo "🔍 Validating serverless.yml configuration..."
            npx serverless print --stage production || {
              echo "❌ Serverless configuration validation failed"
              exit 1
            }
            echo "🚀 Deploying to production..."
            npx serverless deploy --stage production || {
              echo "❌ Deployment failed"
              exit 1
            }
          else
            echo "⚠️  infra/serverless directory not found, skipping deployment"
          fi
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_PROD != '' && secrets.AWS_ACCESS_KEY_ID_PROD || secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD != '' && secrets.AWS_SECRET_ACCESS_KEY_PROD || secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
      
      - name: Deploy Frontend (Vercel)
        run: |
          cd src/frontend
          npm install -g vercel
          vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  agent-workflow:
    name: Agent Workflow (GitHub API)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[AGENT]')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python (для агентов)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install PyGithub
      
      - name: Use GitHub token for GitHub API calls
        env:
          # Поддержка обоих вариантов имени секрета
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "✅ Using GitHub token for authentication"
          echo "Token format: ${GITHUB_TOKEN:0:7}...${GITHUB_TOKEN: -4}"
          
          # Тест подключения к GitHub API
          python3 << 'EOF'
          import os
          from github import Github
          
          token = os.getenv('GITHUB_TOKEN')
          if not token:
              print("❌ GITHUB_TOKEN not set")
              exit(1)
          
          try:
              g = Github(token)
              user = g.get_user()
              print(f"✅ Connected to GitHub as: {user.login}")
              
              # Получение репозитория
              repo = g.get_repo("recreomassage-hub/flowlogic.shop")
              print(f"✅ Repository: {repo.full_name}")
              print(f"   Description: {repo.description or 'N/A'}")
              print(f"   Status: {'Private' if repo.private else 'Public'}")
              
              # Получение последних коммитов
              commits = list(repo.get_commits()[:5])
              print(f"\n📝 Last 5 commits:")
              for commit in commits:
                  msg = commit.commit.message.split('\n')[0]
                  print(f"   - {commit.sha[:7]}: {msg}")
              
          except Exception as e:
              print(f"❌ Error: {e}")
              exit(1)
          EOF
      
      - name: Agent operations
        env:
          # Поддержка обоих вариантов имени секрета
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPO: recreomassage-hub/flowlogic.shop
        run: |
          echo "🤖 Agent operations can use GITHUB_TOKEN here"
          # Пример: создание issue, комментариев, проверка PR и т.д.

